<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1622"/>
      <stop offset="1" stop-color="#070a0f"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39ff14"/>
      <stop offset="1" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- shield -->
  <path d="M128 16 L222 52 V128 C222 188 182 226 128 244
           C74 226 34 188 34 128 V52 Z"
        fill="url(#shield)" stroke="url(#edge)" stroke-width="6"/>
  <!-- circuit traces -->
  <g stroke="#13324a" stroke-width="3" fill="none" opacity="0.9">
    <path d="M58 100 H86"/>
    <path d="M198 100 H170"/>
    <path d="M64 160 H92"/>
    <path d="M192 160 H164"/>
  </g>
  <g fill="#00e5ff" opacity="0.8">
    <circle cx="58" cy="100" r="4"/><circle cx="198" cy="100" r="4"/>
    <circle cx="64" cy="160" r="4"/><circle cx="192" cy="160" r="4"/>
  </g>
  <!-- footprints / "hunter" tracks, neon green -->
  <g fill="#39ff14" opacity="0.9">
    <ellipse cx="104" cy="106" rx="12" ry="17"/>
    <circle cx="92"  cy="88" r="5"/>
    <circle cx="104" cy="84" r="5"/>
    <circle cx="116" cy="88" r="5"/>
    <ellipse cx="150" cy="148" rx="12" ry="17"/>
    <circle cx="138" cy="130" r="5"/>
    <circle cx="150" cy="126" r="5"/>
    <circle cx="162" cy="130" r="5"/>
  </g>
  <!-- crosshair ring = "hunting" -->
  <g filter="url(#glow)">
    <circle cx="128" cy="128" r="64" fill="none" stroke="#00e5ff" stroke-width="5"/>
    <line x1="128" y1="52" x2="128" y2="74" stroke="#00e5ff" stroke-width="5" stroke-linecap="round"/>
    <line x1="128" y1="182" x2="128" y2="204" stroke="#00e5ff" stroke-width="5" stroke-linecap="round"/>
    <line x1="52" y1="128" x2="74" y2="128" stroke="#00e5ff" stroke-width="5" stroke-linecap="round"/>
    <line x1="182" y1="128" x2="204" y2="128" stroke="#00e5ff" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
